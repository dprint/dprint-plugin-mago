name: check_updates
on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 7 * * *
jobs:
  build:
    name: check updates
    if: github.repository == 'dprint/dprint-plugin-mago'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: '${{ secrets.GH_DPRINTBOT_PAT }}'
